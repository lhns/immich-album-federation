name: Dependency updates

on:
  schedule:
    - cron: "30 6 * * 1" # weekly, Monday morning
  workflow_dispatch:

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
